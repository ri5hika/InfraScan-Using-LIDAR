<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Login - Infrascan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <h1>Government Login</h1>
                <p>Access restricted to authorized government officials and disaster response teams</p>
            </div>
            
            <form class="login-form" onsubmit="handleLogin(event, 'government')">
                <div class="form-group">
                    <label for="email">Official Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@gov.in" required>
                </div>
                
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" name="department" required>
                        <option value="">Select Department</option>
                        <option value="disaster">Disaster Management</option>
                        <option value="ndrf">NDRF</option>
                        <option value="military">Armed Forces</option>
                        <option value="infrastructure">Infrastructure</option>
                        <option value="planning">Urban Planning</option>
                        <option value="environment">Environment & Forests</option>
                        <option value="finance">Finance & Budget</option>
                        <option value="other">Other Government Agency</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <label for="otp">Two-Factor Authentication Code</label>
                    <input type="text" id="otp" name="otp" placeholder="Enter 6-digit code" maxlength="6" required>
                </div>
                
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
                
                <button type="submit" class="login-btn">Secure Login</button>
            </form>
            
            <div class="login-footer">
                <p>Not authorized? <a href="community-login.html">Use Community Login</a></p>
                <p><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
